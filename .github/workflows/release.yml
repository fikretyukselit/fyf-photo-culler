name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar_name: fyf-backend-aarch64-apple-darwin
            sidecar_sep: ":"
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar_name: fyf-backend-x86_64-apple-darwin
            sidecar_sep: ":"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: fyf-backend-x86_64-pc-windows-msvc.exe
            sidecar_sep: ";"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: fyf-backend-x86_64-unknown-linux-gnu
            sidecar_sep: ":"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install fastapi "uvicorn[standard]" opencv-python-headless Pillow imagehash scikit-image tqdm numpy

      - name: Build Python sidecar
        shell: bash
        run: |
          pyinstaller --onefile --name fyf-backend backend/server.py \
            --hidden-import culling \
            --add-data "culling${{ matrix.sidecar_sep }}culling" \
            --distpath dist/
          mkdir -p ui/src-tauri/binaries
          cp dist/fyf-backend* ui/src-tauri/binaries/${{ matrix.sidecar_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: ui
        run: bun install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ui
          tauriScript: bun run tauri
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename macOS updater artifacts to include arch
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          BUNDLE_DIR="ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ARCH="${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}"
          for f in "$BUNDLE_DIR"/*.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "$BUNDLE_DIR/FYF Photo Culler_${ARCH}.app.tar.gz"
          done
          for f in "$BUNDLE_DIR"/*.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "$BUNDLE_DIR/FYF Photo Culler_${ARCH}.app.tar.gz.sig"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe.sig
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.sig
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.sig

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json for auto-updater
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/fikretyukselit/fyf-photo-culler/releases/download/${TAG}"

          echo "=== Artifacts ==="
          find artifacts -type f | sort
          echo "================="

          # Helper: find a single file by glob pattern and return its basename
          find_asset() { basename "$(find artifacts -name "$1" ! -name "*.sig" | head -1)" 2>/dev/null || echo ""; }
          read_sig() { cat "$(find artifacts -name "$1" | head -1)" 2>/dev/null || echo ""; }

          # macOS updater tarballs (renamed with arch in build step)
          MAC_ARM_TAR=$(find_asset "*_aarch64.app.tar.gz")
          MAC_ARM_SIG=$(read_sig "*_aarch64.app.tar.gz.sig")
          MAC_X64_TAR=$(find_asset "*_x64.app.tar.gz")
          MAC_X64_SIG=$(read_sig "*_x64.app.tar.gz.sig")

          # Windows & Linux
          WIN_NSIS=$(find_asset "*-setup.exe")
          WIN_NSIS_SIG=$(read_sig "*-setup.exe.sig")
          LINUX_APPIMAGE=$(find_asset "*.AppImage")
          LINUX_SIG=$(read_sig "*.AppImage.sig")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "FYF Photo Culler ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE_URL}/${MAC_ARM_TAR}",
                "signature": "${MAC_ARM_SIG}"
              },
              "darwin-x86_64": {
                "url": "${BASE_URL}/${MAC_X64_TAR}",
                "signature": "${MAC_X64_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/${WIN_NSIS}",
                "signature": "${WIN_NSIS_SIG}"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/${LINUX_APPIMAGE}",
                "signature": "${LINUX_SIG}"
              }
            }
          }
          ENDJSON

          echo "=== latest.json ==="
          cat latest.json
          echo "==================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "FYF Photo Culler ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            latest.json
